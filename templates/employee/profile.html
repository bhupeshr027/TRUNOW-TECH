{% extends "employee/layout.html" %}
{% block title %}Profile | TRUNOW{% endblock %}
{% block employee_content %}
<div class="soft-card p-4">
    <div class="row g-4">
        <div class="col-lg-4">
            <img class="avatar-preview mb-3" style="width:120px; height:120px;" src="{{ url_for('static', filename='uploads/profiles/' ~ employee.profile_photo) if employee.profile_photo else url_for('static', filename='images/logo-tt.jpg') }}" alt="{{ employee.full_name }}">
            <h4>{{ employee.full_name }}</h4>
            <p class="mini-muted">{{ employee.designation }}</p>
        </div>
        <div class="col-lg-8">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Department</label>
                    <input class="form-control" value="{{ employee.department }}" readonly>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Designation</label>
                    <input class="form-control" value="{{ employee.designation }}" readonly>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Phone</label>
                    <input class="form-control" value="{{ employee.phone }}" readonly>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <input class="form-control" value="{{ employee.email }}" readonly>
                </div>
            </div>
            <form method="post" enctype="multipart/form-data" class="mt-4">
                <label class="form-label">Update Profile Photo</label>
                <input type="file" class="form-control" name="profile_photo" accept=".png,.jpg,.jpeg,.webp" required>
                <button class="btn btn-primary mt-3">Upload Photo</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
