{% extends "admin/layout.html" %}
{% block title %}{{ 'Edit Employee' if edit_mode else 'Add Employee' }} | TRUNOW{% endblock %}
{% block admin_content %}
<div class="soft-card p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="mb-1">{{ 'Edit Employee' if edit_mode else 'Add Employee' }}</h4>
            <p class="mini-muted mb-0">Manage employee profile, access, and organizational details.</p>
        </div>
        <a href="{{ url_for('admin_employees') }}" class="btn btn-outline-primary">Back</a>
    </div>
    <form method="post" enctype="multipart/form-data">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Employee ID</label>
                <input class="form-control" name="employee_id" value="{{ employee.employee_id if employee else '' }}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Full Name</label>
                <input class="form-control" name="full_name" value="{{ employee.full_name if employee else '' }}" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Username</label>
                <input class="form-control" name="username" value="{{ employee.username if employee else '' }}" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Phone</label>
                <input class="form-control" name="phone" value="{{ employee.phone if employee else '' }}" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" name="email" value="{{ employee.email if employee else '' }}" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Department</label>
                <input class="form-control" name="department" value="{{ employee.department if employee else '' }}" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Designation</label>
                <input class="form-control" name="designation" value="{{ employee.designation if employee else '' }}" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">{{ 'Reset Password' if edit_mode else 'Password' }}</label>
                <input type="password" class="form-control" name="password" {{ '' if edit_mode else 'required' }}>
            </div>
            <div class="col-md-6">
                <label class="form-label">Profile Photo</label>
                <input type="file" class="form-control" name="profile_photo" accept=".png,.jpg,.jpeg,.webp">
            </div>
            <div class="col-md-6">
                <label class="form-label">Status</label>
                <select class="form-select" name="status">
                    {% for option in ['Active', 'Inactive'] %}
                    <option value="{{ option }}" {% if employee and employee.status == option %}selected{% endif %}>{{ option }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <button class="btn btn-primary mt-4">{{ 'Update Employee' if edit_mode else 'Create Employee' }}</button>
    </form>
</div>
{% endblock %}
